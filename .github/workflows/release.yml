name: Release

# On every push to main, release-please maintains a "release PR" that accumulates
# the changelog + next version. When that PR is merged, it tags the release, creates
# the GitHub Release, and this same workflow then builds the signed AAB + APK and
# attaches them to that release.
#
# Everything downstream is derived from Conventional Commit messages — no manual
# version editing. See docs/RELEASING.md.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.35.7"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-attach:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Reconstruct release signing material from repository secrets.
      # These files are git-ignored and only ever exist on the CI runner.
      - name: Set up release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # storeFile is resolved by build.gradle.kts via rootProject.file() (root = android/),
          # so the keystore must live at android/upload-keystore.jks to match storeFile below.
          echo "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Install dependencies
        run: flutter pub get

      # build-name (versionName) comes from the release tag; build-number
      # (versionCode) is the monotonically increasing CI run number so the
      # Play Store's "always increasing" rule can never be violated.
      - name: Build signed App Bundle
        run: >
          flutter build appbundle --release
          --build-name=${{ needs.release-please.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Build signed APK
        run: >
          flutter build apk --release
          --build-name=${{ needs.release-please.outputs.version }}
          --build-number=${{ github.run_number }}

      # Rename to human-friendly, version-stamped filenames so the Release page
      # shows e.g. "Settlement-1.1.0.apk" instead of "app-release.apk".
      - name: Rename artifacts
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          mkdir -p dist
          cp build/app/outputs/bundle/release/app-release.aab "dist/Settlement-${VERSION}.aab"
          cp build/app/outputs/flutter-apk/app-release.apk     "dist/Settlement-${VERSION}.apk"

      - name: Attach artifacts to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" dist/* --clobber
